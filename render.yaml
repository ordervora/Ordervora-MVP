# Render Blueprint — deploys apps/api only, on Render's free plan.
#
# Why this shape (see docs/runbooks/render-deploy.md for the full story):
# the database lives on Supabase (already provisioned, free, no card
# required — see that doc), and apps/web is deployed separately to Vercel
# (also free, no card, and it's the natural home for a Next.js app). An
# earlier version of this file bundled a Render-hosted Postgres database
# and a second paid "starter" web service into one Blueprint — Render
# will not finish provisioning any paid resource without a payment method
# on file, which is exactly the wall that blocked deployment before. This
# version requests nothing but free-tier resources, so no card is needed
# at any point.
#
# Deploy: render.com -> New -> Blueprint -> select this repo -> pick THIS
# branch explicitly from the branch dropdown (do not accept whatever
# branch the picker defaults to) -> Apply. When prompted, paste in the two
# secret values below (DATABASE_URL, FRONTEND_URL) — these are the only
# manual values, and they're marked `sync: false` deliberately so they're
# never committed to this public repo.

services:
  - type: web
    name: ordervora-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    # Runs after the image is built, before the new instance starts serving
    # traffic. `prisma migrate deploy` applies any pending migrations;
    # `seed-if-empty.js` populates the Sprint 08 beta demo data exactly
    # once (it no-ops on every deploy after the first).
    preDeployCommand: "./node_modules/.bin/prisma migrate deploy && node dist/scripts/seed-if-empty.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      # Paste the Supabase connection string here when Render prompts for
      # it (see docs/runbooks/render-deploy.md for the exact value).
      # sync: false means Render asks for this once and never stores it
      # in git — required since this repo is public.
      - key: DATABASE_URL
        sync: false
      # Paste the Vercel web app's URL here (e.g. https://ordervora-web.vercel.app).
      # Also sync: false — not a secret, but its real value isn't known
      # until the Vercel deployment exists, so it can't be a literal in
      # this file either.
      - key: FRONTEND_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      # generateValue produces a base64 value, but this app validates
      # COMMERCE_ENCRYPTION_KEY against a 64-char-hex regex at startup, so
      # generateValue can't be used here. It's also a real secret, so — like
      # DATABASE_URL/FRONTEND_URL above — it must not be a literal in this
      # public repo either: sync: false, paste the value Render prompts you
      # for (see docs/runbooks/render-deploy.md for a ready-to-use value).
      - key: COMMERCE_ENCRYPTION_KEY
        sync: false
